server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root /opt/pulse/public;
    index index.php;

    charset utf-8;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/javascript application/json application/xml application/rss+xml
        font/truetype font/opentype image/svg+xml
        text/css text/javascript text/plain text/xml;

    # Port Scanner proxy
    location = /scanner {
        return 301 /scanner/;
    }
    location /scanner/ {
        proxy_pass          http://127.0.0.1:5000/;
        proxy_http_version  1.1;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    X-Script-Name /scanner;
        proxy_buffering     off;
        proxy_read_timeout  3600s;
        proxy_redirect      http://127.0.0.1:5000/ /scanner/;
        proxy_redirect      ~^/(?!scanner)(.*)$ /scanner/$1;
        sub_filter          'href="/'  'href="/scanner/';
        sub_filter          'action="/' 'action="/scanner/';
        sub_filter_once     off;
        sub_filter_types    text/html application/json;
    }

    # Laravel routing
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    location ~* \.(css|js|gif|ico|jpeg|jpg|png|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~ /\.(?!well-known).* { deny all; }
    location ~ /\.(env|git)        { deny all; }

    access_log /var/log/nginx/pulse_access.log;
    error_log  /var/log/nginx/pulse_error.log;
}
